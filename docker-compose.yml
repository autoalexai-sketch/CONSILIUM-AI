version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
      - "8081:8081"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///consilium.db
      - REDIS_URL=redis://localhost:6379

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"