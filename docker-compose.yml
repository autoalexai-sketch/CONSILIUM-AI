services:
  app:
    build: .
    container_name: consilium-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./consilium.db:/app/consilium.db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: consilium-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
